site_name: Chonky Documentation
site_description: Documentation for Chonky, a Streamlit-based document loading, text processing, embedding, and vector-search application.
site_author: Terry D. Eppler
site_url: https://is-leeroy-jenkins.github.io/Chonky/

repo_url: https://github.com/is-leeroy-jenkins/Chonky
repo_name: is-leeroy-jenkins/Chonky

theme:
  name: material
  language: en
  logo: img/chonky.png
  favicon: img/favicon.ico
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.select
    - content.tabs.link
  palette:
    - scheme: slate
      primary: blue
      accent: blue
  font:
    text: Roboto
    code: Roboto Mono

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - .
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_signature_annotations: true
            separate_signature: true
            members_order: source
            inherited_members: false
            filters:
              - "!^_"

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - def_list
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - assets/css/chonky.css

extra_javascript:
  - assets/js/chonky.js

nav:
  - Home: index.md
  - Architecture: architecture.md
  - User Guide:
      - Overview: user-guide/index.md
      - Loading: user-guide/loading.md
      - Processing: user-guide/processing.md
      - Analysis: user-guide/analysis.md
      - Tokenization: user-guide/tokenization.md
      - Embeddings: user-guide/embeddings.md
      - Vector Database: user-guide/vector-database.md
  - API Reference:
      - Overview: api/index.md
      - App: api/app.md
      - Config: api/config.md
      - Embedders: api/embedders.md
      - Loca: api/loca.md
      - Loaders: api/loaders.md
      - Processors: api/processors.md
  - Development: development.md